<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: Layout(~{:: #conteudo-cadastro}, ~{:: #estilos-cadastro}, ~{:: #scripts-cadastro})}">
<head>
    <meta charset="UTF-8">
    <title>Login - Quintal Arte & Retalhos</title>
    
    <th:block id="estilos-cadastro">
        <link rel="stylesheet" th:href="@{/css/formularios.css}">
        <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    </th:block>
</head>
<body class="auth-page">

    <div id="conteudo-cadastro">
        <section data-aos="zoom-in" data-aos-duration="800">
            <div class="container mt-5">
                <div class="row justify-content-center">
                    <div class="col-md-8 col-lg-6">
                        <div class="auth-card">
                            <h2 class="text-center mb-4">Acesso à Conta</h2>
                            <form th:action="@{/login}" method="post">
                                
                                <div th:if="${param.error}" class="text-center alert alert-danger">
                                    <th:block th:if="${session.SPRING_SECURITY_LAST_EXCEPTION!=null}">
                                        [[${session.SPRING_SECURITY_LAST_EXCEPTION.message}]]
                                    </th:block>
                                </div>
                                
                                <div th:if="${param.logout}" class="text-center alert alert-success">
                                    Você saiu da sua conta!
                                </div>
                                
                                <div class="mb-4">
                                    <label class="form-label-auth" for="username">E-mail:</label>
                                    <div class="input-group">
                                        <span class="input-group-text auth-icon"><i class="fas fa-envelope"></i></span> 
                                        <input type="email" class="form-control auth-input" id="username" name="username" placeholder="seu@email.com" required>
                                    </div>
                                </div>
                                
                                <div class="mb-4">
                                    <label class="form-label-auth" for="password">Senha:</label>
                                    <div class="input-group">
                                        <span class="input-group-text auth-icon"><i class="fas fa-lock"></i></span> 
                                        <input type="password" class="form-control auth-input" id="password" name="password" placeholder="Senha" required>
                                    </div>
                                </div>
                                
                                <div class="d-grid mb-4">
                                    <button type="submit" class="btn btn-auth btn-lg">
                                        <i class="fas fa-sign-in-alt me-2"></i>Acessar Conta
                                    </button>
                                </div>
                                
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="remember">
                                        <label class="form-check-label auth-label" for="remember"> Manter conectado </label>
                                    </div>
                                    <a href="/forgot-password" class="link-auth small"><i class="fas fa-question-circle me-1"></i>Recuperar senha</a>
                                </div>
                            </form>
                            
                            <div class="text-center pt-3">
                                <p class="mb-0 auth-label">
                                    Novo membro? <a href="/cadastro" class="link-auth fw-semibold">Criar nova conta</a>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <th:block id="scripts-cadastro">
        <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
        <script>
            $(document).ready(function() {
                // Agora você pode usar jQuery sem medo aqui também!
                AOS.init({
                    duration : 1000,
                    once : true
                });
            });
        </script>
    </th:block>

</body>
</html>
