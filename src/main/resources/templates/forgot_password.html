<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: Layout(~{:: #conteudo-cadastro}, ~{:: #estilos-cadastro}, ~{:: #scripts-cadastro})}">
<head>
<meta charset="UTF-8">
<title>Quintal Arte & Retalhos</title>
<link rel="stylesheet" href="/css/auth.css">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
	<th:block id="estilos-cadastro">
	<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/formularios.css}">
    </th:block>
</head>
<body class="auth-page">
<div id="conteudo-cadastro">
	<div class="fundo-retalhos" id="fundoRetalhos"></div>
	<section data-aos="zoom-in" data-aos-duration="800">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-md-8 col-lg-6">
					<div class="auth-card">
						<h2 class="text-center mb-4">Esqueceu a senha?</h2>
						<h6
							style="display: block; width: 100%; text-align: center; margin-bottom: 1.5rem;">
							Digite o endereço de e-mail associado à sua conta e enviaremos um
							link para você redefinir sua senha.</h6>

						<th:block th:if="${session.succMsg}">
							<p class="text-success fw-bold text-center">[[${session.succMsg}]]</p>
							<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
						</th:block>

						<th:block th:if="${session.errorMsg}">
							<p class="text-danger fw-bold text-center">[[${session.errorMsg}]]</p>
							<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
						</th:block>

						<form th:action="@{/forgot-password}" method="post">

							<!-- Exemplo do email -->
							<div class="mb-4">
								<label class="form-label-auth" for="nome">E-mail:</label>
								<div class="input-group">
									<span class="input-group-text auth-icon"> <i
										class="fas fa-envelope"></i>
									</span> <input type="email" class="form-control auth-input" id="email"
										name="email" placeholder="seu@email.com" required>
								</div>
							</div>
							<!-- Botão Login -->
							<div class="d-grid mb-4">
								<button type="submit" class="btn btn-auth btn-lg">
									<i class="fas fa-sign-in-alt me-2"></i>Enviar
								</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</section>
	</div>

	<th:block id="scripts-cadastro">
	<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
	<script>
	$(document).ready(function() {

		AOS.init({
			duration : 1000,
			once : true
		});
	});
	</script>
	</th:block>
</body>
</html>
