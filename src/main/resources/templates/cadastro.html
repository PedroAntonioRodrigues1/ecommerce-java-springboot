<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base :: Layout(~{:: #conteudo-cadastro}, ~{:: #estilos-cadastro}, ~{:: #scripts-cadastro})}">
<head>
<meta charset="UTF-8">
<title>Cadastro - Quintal Arte & Retalhos</title>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<th:block id="estilos-cadastro">
	<link rel="stylesheet" th:href="@{/css/formularios.css}">
	<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</th:block>
</head>
<body class="auth-page">
	<div id="conteudo-cadastro">
		<div class="fundo-retalhos" id="fundoRetalhos"></div>

		<section data-aos="zoom-in" data-aos-duration="800">
			<div class="container">
				<div class="row justify-content-center">
					<div class="col-md-8">
						<div class="auth-card">
							<form th:action="@{/saveUser}" method="post" novalidate
								id="cadastroUser">

								<h3 class="section-title-auth">Cadastro</h3>
								<div>
									<th:block th:if="${session.succMsg}">
										<p class="text-success fw-bold" style="text-align: center;">[[${session.succMsg}]]</p>
										<th:block
											th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
									</th:block>

									<th:block th:if="${session.errorMsg}">
										<p class="text-danger fw-bold" style="text-align: center;">[[${session.errorMsg}]]</p>
										<th:block
											th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
									</th:block>
								</div>

								<div class="mb-3">
									<label class="form-label-auth" for="nome">Nome
										Completo:</label>
									<div class="input-group">
										<span class="input-group-text auth-icon"> <i
											class="fas fa-user"></i>
										</span> <input type="text" id="nome" name="nome"
											class="form-control auth-input" placeholder="Seu nome"
											required>
									</div>
								</div>

								<div class="mb-3">
									<label class="form-label-auth" for="loginEmail">E-mail:</label>
									<div class="input-group">
										<span class="input-group-text auth-icon"> <i
											class="fas fa-envelope"></i>
										</span> <input type="email" id="loginEmail" name="loginEmail"
											class="form-control auth-input" placeholder="seu@email.com"
											required>
									</div>
								</div>

								<div class="mb-3">
									<label class="form-label-auth" for="telefone">Telefone:</label>
									<div class="input-group">
										<span class="input-group-text auth-icon"> <i
											class="fas fa-phone"></i>
										</span> <input type="tel" id="telefone" name="telefone"
											class="form-control auth-input" placeholder="(99) 99999-9999"
											required>
									</div>
								</div>

								<div class="row">
									<div class="col-md-6 mb-3">
										<label class="form-label-auth" for="senha">Senha:</label>
										<div class="input-group">
											<span class="input-group-text auth-icon"> <i
												class="fas fa-lock"></i>
											</span> <input type="password" id="senha" name="senha"
												class="form-control auth-input" placeholder="Senha" required>
										</div>
									</div>

									<div class="col-md-6 mb-3">
										<label class="form-label-auth" for="confirmarSenha">Repita
											a Senha:</label>
										<div class="input-group">
											<span class="input-group-text auth-icon"> <i
												class="fas fa-lock"></i>
											</span> <input type="password" id="confirmarSenha"
												name="confirmarSenha" class="form-control auth-input"
												placeholder="Repita a senha" required>
										</div>
									</div>
								</div>

								<div class="d-grid mt-4">
									<button type="submit" class="btn btn-auth btn-lg">
										<i class="fas fa-user-check me-2"></i>Criar Conta
									</button>
								</div>

							</form>
						</div>
					</div>
				</div>
			</div>
		</section>
	</div>
	<th:block id="scripts-cadastro">
		<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
		<script>
			$(document).ready(function() {

				AOS.init({
					duration : 1000,
					once : true
				});
			});
		</script>
	</th:block>
</body>
</html>
