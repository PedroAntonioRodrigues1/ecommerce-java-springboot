# ##########################################################################
# MODELO DE CONFIGURACAO - PROJETO E-COMMERCE
# ##########################################################################
# INSTRUCOES:
# 1. Copie o conteudo deste arquivo.
# 2. Crie um ficheiro chamado 'application.properties' na mesma pasta.
# 3. Substitua os valores abaixo pelos seus dados locais.
# ##########################################################################

# Configuracoes do Base de Dados (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/nome_da_sua_base_de_dados
spring.datasource.username=seu_usuario_postgres
spring.datasource.password=sua_senha_postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracao do JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Regionalizacao e Mensagens
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.web.locale=pt_BR
spring.web.locale-resolver=fixed

# Configuracao do Servico de Email (Gmail SMTP)
# Para a password, use a "App Password" gerada na sua conta Google
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=seu_email@gmail.com
spring.mail.password=sua_app_password_de_16_caracteres

# Propriedades SMTP
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2